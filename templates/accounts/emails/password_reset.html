<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Password Reset</title></head>
<body style="font-family:Inter,Arial,sans-serif;background:#0f1117;color:#e2e8f0;padding:40px 20px">
<div style="max-width:560px;margin:0 auto;background:#1a1f2e;border-radius:16px;overflow:hidden">
<div style="background:linear-gradient(135deg,#3b63f2,#10b981);padding:32px;text-align:center">
<div style="font-size:28px;font-weight:800;color:#fff">🏫 {{ SCHOOL_NAME }}</div>
<div style="color:rgba(255,255,255,0.8);margin-top:6px">Password Reset</div></div>
<div style="padding:32px">
<p>Hi <strong>{{ user.get_full_name }}</strong>,</p>
<p>You requested a password reset. Click the button below to set a new password:</p>
<div style="text-align:center;margin:28px 0"><a href="{{ reset_url }}" style="display:inline-block;background:linear-gradient(135deg,#3b63f2,#10b981);color:#fff;text-decoration:none;padding:14px 32px;border-radius:10px;font-weight:700;font-size:15px">Reset My Password</a></div>
<p style="color:#6b7280;font-size:13px">This link expires in 24 hours. If you didn't request a reset, please ignore this email.</p>
</div></div></body></html>
