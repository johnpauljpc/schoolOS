{% load static %}<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Reset Password — {{ SCHOOL_NAME }}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="{% static 'css/style.css' %}"></head>
<body><div class="auth-page"><div class="auth-card fade-in"><div class="auth-card__brand"><div class="auth-card__logo">S</div><div class="auth-card__title">Reset Password</div><div class="auth-card__subtitle">Enter your email to receive a reset link</div></div>
{% if messages %}{% for msg in messages %}<div class="alert alert-{{ msg.tags }}" style="margin-bottom:20px"><div class="alert__body">{{ msg }}</div></div>{% endfor %}{% endif %}
<form method="post" data-loading>{% csrf_token %}<div class="form-group"><label class="form-label required">Email Address</label>{{ form.email }}</div><button type="submit" class="btn btn-primary btn-block" style="margin-top:20px">Send Reset Link</button></form>
<div style="margin-top:20px;text-align:center"><a href="{% url 'accounts:login' %}" style="font-size:13px;color:hsl(224,76%,60%)">← Back to Login</a></div></div></div></body></html>
