{% extends 'base.html' %}{% block title %}Dashboard{% endblock %}{% block content %}
<div class="page-header"><div class="page-header__left"><h1 class="page-header__title">Vice Principal Dashboard</h1><p class="page-header__subtitle">{{ today|date:"l, j F Y" }}</p></div></div>
<div class="stat-grid"><div class="stat-card stat-card--blue"><div class="stat-card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-card__info"><div class="stat-card__label">Students</div><div class="stat-card__value">{{ total_students }}</div></div></div><div class="stat-card stat-card--orange"><div class="stat-card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></div><div class="stat-card__info"><div class="stat-card__label">Pending Results</div><div class="stat-card__value">{{ pending_results }}</div></div></div></div>
<div class="card card--shadow" style="margin-top:8px"><div class="card__header"><span class="card__title">Quick Links</span></div><div class="card__body"><div style="display:flex;gap:10px;flex-wrap:wrap"><a href="{% url 'examinations:result-list' %}" class="btn btn-outline">Results</a><a href="{% url 'examinations:result-approve' %}" class="btn btn-primary">Approve Results</a><a href="{% url 'students:list' %}" class="btn btn-outline">Students</a></div></div></div>
{% endblock %}
